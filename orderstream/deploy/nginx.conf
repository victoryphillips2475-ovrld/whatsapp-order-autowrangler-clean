# FILE: /home/overlord/.openclaw/workspace/VULCAN/deploy/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# OrderStream Nginx configuration — reverse proxy + static file server
#
# URL routing:
#   /api/v1/*   → FastAPI backend (Docker internal: orderstream-backend:8000)
#   /ui/*       → Merchant dashboard static files (generated_ui/)
#   /mobile/*   → Mobile SPA build (mobile/dist/)
#   /health     → Nginx synthetic health (no backend needed)
#
# Coolify note: bind ${PWD}/deploy/nginx.conf to /etc/nginx/nginx.conf in
# the nginx container, and mount generated_ui + mobile/dist as volumes.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=256k flush=1s;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; img-src 'self' data: https:; font-src https://fonts.gstatic.com; connect-src 'self' https://cloud.appwrite.io" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Server "nginx" always;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        application/xml application/xml+rss text/xml
        image/svg+xml font/ttf font/woff font/woff2;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream backend ──────────────────────────────────────────────────────
    upstream orderstream_backend {
        server orderstream-backend:8000;
        keepalive 32;
    }

    # ── Server ───────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # Synthetic health — no backend required
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}\n';
            add_header Content-Type application/json;
        }

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/v1/ {
            # Rate limit all API calls
            limit_req zone=api burst=20 nodelay;

            # Proxy to FastAPI
            proxy_pass http://orderstream_backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # CORS preflight — let FastAPI handle it
            # (removed invalid "proxy OPTIONS" directive — FastAPI's CORSMiddleware handles it)
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://orderstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Static files ─────────────────────────────────────────────────────
        #
        # /ui/*        → merchant dashboard (generated_ui/index.html at root)
        # /mobile/*    → mobile SPA build (mobile/dist/index.html at root)
        #

        location /ui/ {
            alias /usr/share/nginx/html/ui/;
            try_files $uri $uri/ /ui/index.html;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;

            # Security headers for static files (override global CSP for SPA)
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src https://fonts.gstatic.com; connect-src 'self' https://cloud.appwrite.io https://api.paystack.co" always;
        }

        location /mobile/ {
            alias /usr/share/nginx/html/mobile/;
            try_files $uri $uri/ /mobile/index.html;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;

            # Relaxed CSP for mobile SPA (needs 'unsafe-eval' for Capacitor)
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src https://fonts.gstatic.com; connect-src 'self' http://localhost:* ws://localhost:* https://cloud.appwrite.io https://api.paystack.co" always;
        }

        # Root → redirect to merchant dashboard
        location = / {
            return 302 /ui/;
        }

        # Default: 404 for unknown paths (do not proxy to backend)
        location / {
            return 404 '{"error":"not_found","message":"Resource not found"}';
            add_header Content-Type application/json;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 200 '{"error":"server_error","message":"Internal server error"}';
            add_header Content-Type application/json;
        }
    }
}