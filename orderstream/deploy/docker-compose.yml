# ─────────────────────────────────────────────────────────────────────────────
# OrderStream — backend API + nginx reverse proxy
#
# Topology:
#   nginx:80  →  public ingress (serves /ui/* and /mobile/* as static files,
#                proxies /api/* to orderstream-backend:8000)
#   orderstream-backend   →  FastAPI on port 8000 (no public exposure)
#
# Usage:
#   cp deploy/.env.production deploy/.env   # fill in real values
#   docker compose -f deploy/docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # --------------------------------------------------------------------------
  # FastAPI backend
  # --------------------------------------------------------------------------
  orderstream-backend:
    image: orderstream-backend:latest
    restart: unless-stopped
    container_name: orderstream-backend
    # Build from local Dockerfile (replace with your registry for CI/CD):
    build:
      context: ${PWD}
      dockerfile: deploy/Dockerfile
    env_file:
      - deploy/.env.production
    environment:
      # Tell FastAPI where to find the static UI files inside this container.
      # The generated_ui/ directory is bind-mounted from the host below.
      GENERATED_UI_PATH: /app/generated_ui
      APP_ENV: production
      # Logging
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount generated_ui from host so backend can serve /ui/* via StaticFiles
      - ${PWD}/generated_ui:/app/generated_ui:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - orderstream-net
    # No public ports — only nginx accesses this

  # --------------------------------------------------------------------------
  # WhatsApp Baileys Node service
  # --------------------------------------------------------------------------
  orderstream-whatsapp:
    image: orderstream-whatsapp:latest
    restart: unless-stopped
    container_name: orderstream-whatsapp
    build:
      context: ${PWD}
      dockerfile: deploy/orderstream-whatsapp.dockerfile
    env_file:
      - deploy/.env.production
    environment:
      NODE_ENV: production
      FASTAPI_URL: http://orderstream-backend:8000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-whatsapp_webhook_secret_dev}
    volumes:
      # Persist Baileys session/auth state across restarts
      - orderstream-whatsapp-session:/app/session
    depends_on:
      orderstream-backend:
        condition: service_healthy
    networks:
      - orderstream-net
    # No public ports — internally registers with FastAPI only
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # --------------------------------------------------------------------------
  # Nginx reverse proxy + static file server
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    container_name: orderstream-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx config
      - ${PWD}/deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Static merchant dashboard (generated_ui/)
      - ${PWD}/generated_ui:/usr/share/nginx/html/ui:ro
      # Mobile SPA build (dist/)
      - ${PWD}/mobile/dist:/usr/share/nginx/html/mobile:ro
    depends_on:
      orderstream-backend:
        condition: service_healthy
    networks:
      - orderstream-net
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

networks:
  orderstream-net:
    driver: bridge

volumes:
  # WhatsApp Baileys session/auth state — persists across container restarts
  orderstream-whatsapp-session: